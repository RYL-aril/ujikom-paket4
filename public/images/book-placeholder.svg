<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
    <!-- Background -->
    <rect width="400" height="600" fill="#f6f2ea"/>
    
    <!-- Border -->
    <rect x="20" y="20" width="360" height="560" fill="none" stroke="#8b7d73" stroke-width="2"/>
    
    <!-- Spine effect -->
    <line x1="35" y1="40" x2="35" y2="580" stroke="#8b7d73" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Book icon -->
    <g transform="translate(200, 280)">
        <path d="M -40 -40 L -40 40 Q 0 50 40 40 L 40 -40 Q 0 -50 -40 -40 Z" fill="none" stroke="#6f4e37" stroke-width="2.5"/>
        <line x1="-40" y1="-20" x2="40" y2="-20" stroke="#6f4e37" stroke-width="1.5"/>
        <line x1="-40" y1="-5" x2="40" y2="-5" stroke="#6f4e37" stroke-width="1.5"/>
        <line x1="-40" y1="10" x2="40" y2="10" stroke="#6f4e37" stroke-width="1.5"/>
    </g>
    
    <!-- Text -->
    <text x="200" y="520" font-family="Georgia, serif" font-size="20" fill="#6f4e37" text-anchor="middle" font-weight="600">
        Perpustakaan
    </text>
</svg>
